<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plan Details — Amm Sa Appli</title>
  <link href="images/logo.ico" rel="icon">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ─── PAGE LAYOUT ─── */
    body { background: #f7f5ff; }

    .plan-detail-page {
      min-height: 100vh;
      padding: 100px 20px 60px;
      max-width: 900px;
      margin: 0 auto;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: #6820EC;
      text-decoration: none;
      margin-bottom: 32px;
      font-weight: 500;
      transition: gap 0.2s;
    }
    .back-btn:hover { gap: 10px; }

    .lang-switches {
        display: flex;
        gap: 0.5rem;
        margin-left: 4rem;
    }

    .lang-switches .lang-btn {
        font-size: 0.95rem;
        font-weight: 600;
        padding: 0.25rem 0.75rem;
        border: 2px solid var(--primary-dark);
        color: var(--primary);        /* visible text color */
        border-radius: 0.4rem;
        margin-left: 0;
        text-decoration: none;
        transition: background 0.2s, color 0.2s;
    }

    .lang-switches .lang-btn:hover {
        background-color: var(--primary-dark);
        color: #fff;                        /* white text on hover */
    }

    .lang-switches .lang-btn.active {
        background-color: var(--primary);
        border-color: var(--primary);
        color: #fff;                        /* white text when active */
    }

    /* ─── PLAN HERO ─── */
    .plan-hero {
      background: linear-gradient(135deg, #6820EC 0%, #2563EB 100%);
      border-radius: 24px;
      padding: 44px 40px;
      color: #fff;
      margin-bottom: 40px;
      position: relative;
      overflow: hidden;
    }
    .plan-hero::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 240px; height: 240px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
    }
    .plan-hero-tag {
      display: inline-block;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 100px;
      padding: 4px 16px;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: 'DM Sans', sans-serif;
      margin-bottom: 14px;
    }
    .plan-hero h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800;
      margin: 0 0 8px;
    }
    .plan-hero p {
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      opacity: 0.85;
      margin: 0 0 28px;
    }
    .plan-hero-price {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .plan-hero-price .amt {
      font-family: 'Syne', sans-serif;
      font-size: 2.6rem;
      font-weight: 800;
    }
    .plan-hero-price .cur { font-size: 1.1rem; opacity: 0.8; }
    .plan-hero-price .sub {
      font-size: 0.82rem;
      opacity: 0.65;
      font-family: 'DM Sans', sans-serif;
      margin-left: 4px;
    }

    /* ─── WHAT'S INCLUDED ─── */
    .section-card {
      background: #fff;
      border-radius: 20px;
      padding: 32px 36px;
      margin-bottom: 28px;
      box-shadow: 0 2px 20px rgba(104,32,236,0.06);
    }
    .section-card h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      margin: 0 0 22px;
      color: #111;
    }
    .section-card h2 i {
      margin-right: 8px;
      color: #6820EC;
    }

    .features-list {
      list-style: none;
      padding: 0; margin: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    @media (max-width: 580px) {
      .features-list { grid-template-columns: 1fr; }
      .plan-hero { padding: 30px 22px; }
      .section-card { padding: 24px 20px; }
    }
    .features-list li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      color: #333;
      line-height: 1.4;
    }
    .features-list li i {
      color: #6820EC;
      font-size: 1.1rem;
      margin-top: 1px;
      flex-shrink: 0;
    }
    .features-list li.muted { color: #aaa; }
    .features-list li.muted i { color: #ccc; }

    /* ─── WORKFLOW STEPS ─── */
    .workflow-steps {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .workflow-step {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      position: relative;
    }
    .workflow-step:not(:last-child)::after {
      content: '';
      position: absolute;
      left: 17px;
      top: 38px;
      width: 2px;
      height: calc(100% - 14px);
      background: linear-gradient(to bottom, #6820EC33, #2563EB22);
    }
    .step-dot {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6820EC, #2563EB);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.82rem;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .step-body {
      padding-bottom: 24px;
    }
    .step-body h4 {
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      margin: 4px 0 4px;
      color: #111;
    }
    .step-body p {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      color: #666;
      margin: 0;
      line-height: 1.5;
    }

    /* ─── PAYMENT TABLE ─── */
    .milestone-table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
    }
    .milestone-table thead tr {
      background: linear-gradient(90deg, #6820EC, #2563EB);
      color: #fff;
    }
    .milestone-table th {
      padding: 12px 16px;
      text-align: left;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.82rem;
      letter-spacing: 0.04em;
    }
    .milestone-table td {
      padding: 12px 16px;
      border-bottom: 1px solid #f0eaff;
      color: #333;
      vertical-align: middle;
    }
    .milestone-table tbody tr:last-child td { border-bottom: none; }
    .milestone-table tbody tr:nth-child(even) { background: #faf8ff; }
    .milestone-table tbody tr:hover { background: #f0e9fd; }
    .pct-badge {
      display: inline-block;
      background: #6820EC18;
      color: #6820EC;
      border-radius: 100px;
      padding: 2px 10px;
      font-weight: 600;
      font-size: 0.82rem;
    }
    .amount-cell {
      font-weight: 700;
      color: #111;
    }
    .time-cell {
      color: #888;
      font-size: 0.82rem;
      white-space: nowrap;
    }
    .table-total {
      background: linear-gradient(90deg, #f0e9fd, #eff6ff) !important;
    }
    .table-total td {
      font-weight: 700;
      font-family: 'Syne', sans-serif;
      color: #6820EC;
      border-top: 2px solid #6820EC33;
    }

    /* ─── PAYMENT RULES ─── */
    .rules-list {
      list-style: none;
      padding: 0; margin: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .rules-list li {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: #444;
    }
    .rules-list li i {
      color: #6820EC;
      font-size: 1.2rem;
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* ─── CTA ─── */
    .plan-cta {
      text-align: center;
      margin-top: 36px;
    }
    .plan-cta a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #6820EC, #2563EB);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      padding: 16px 40px;
      border-radius: 100px;
      text-decoration: none;
      box-shadow: 0 8px 24px rgba(104,32,236,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .plan-cta a:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(104,32,236,0.4);
    }

    /* ─── HEADER (simplified) ─── */
    .header { position: fixed; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <a href="index.html#home" class="logo">
        <span class="logo-icon"><i class='bx bx-mobile-alt'></i></span>
        Amm Sa Appli
    </a>
    <nav class="navbar">
        <a href="index.html#home" data-lang="nav_home">Home</a>
        <a href="index.html#about" data-lang="nav_about">About</a>
        <a href="index.html#plans" class="active" data-lang="nav_plans">Plans</a>
        <a href="index.html#features" data-lang="nav_features">Features</a>
        <a href="index.html#policy" data-lang="nav_privacy">Privacy</a>
        <a href="index.html#contact" data-lang="nav_contact">Contact</a>
    </nav>
    <div class="lang-switches">
        <a href="#" class="lang-btn" onclick="changeLanguage('en'); return false;">EN</a>
        <a href="#" class="lang-btn" onclick="changeLanguage('fr'); return false;">FR</a>
    </div>
    <a href="index.html#contact" class="btn-header" data-lang="nav_get_started">Get Started</a>
    <i class='bx bx-menu' id="menu-icon"></i>
    </header>

    <div class="plan-detail-page" id="planPage">
    <!-- Content injected by JS -->
  </div>

  <script src="languages/en.js"></script>
  <script src="languages/fr.js"></script>
  <script src="js/language.js"></script>
  <script src="js/script.js"></script>
  <script>
    function t(key) {
        const lang = localStorage.getItem('lang') || 'fr';
        const map = lang === 'en' ? en : fr;
        return map[key] || key;
    }

    const PLANS = {

        color1: '#6820EC', color2: '#2563EB', icon: 'bx-rocket',
        included: [
            { key: 'basic_di1', ok: true }, { key: 'basic_di2', ok: true },
            { key: 'basic_di3', ok: true }, { key: 'basic_di4', ok: true },
            { key: 'basic_di5', ok: true }, { key: 'basic_di6', ok: true },
            { key: 'basic_di7', ok: true }, { key: 'basic_di8', ok: true },
            { key: 'basic_di9', ok: false }, { key: 'basic_di10', ok: false },
            { key: 'basic_di11', ok: false },
        ],
        workflow: [
            { labelKey: 'basic_wf1_label', descKey: 'basic_wf1_desc' },
            { labelKey: 'basic_wf2_label', descKey: 'basic_wf2_desc' },
            { labelKey: 'basic_wf3_label', descKey: 'basic_wf3_desc' },
            { labelKey: 'basic_wf4_label', descKey: 'basic_wf4_desc' },
            { labelKey: 'basic_wf5_label', descKey: 'basic_wf5_desc' },
            { labelKey: 'basic_wf6_label', descKey: 'basic_wf6_desc' },
        ],
        milestones: [
            { nameKey: 'basic_ms1_name', delKey: 'basic_ms1_del', pct: '20%', amount: '40,000 CFA', timeKey: 'basic_ms1_time' },
            { nameKey: 'basic_ms2_name', delKey: 'basic_ms2_del', pct: '20%', amount: '40,000 CFA', timeKey: 'basic_ms2_time' },
            { nameKey: 'basic_ms3_name', delKey: 'basic_ms3_del', pct: '35%', amount: '70,000 CFA', timeKey: 'basic_ms3_time' },
            { nameKey: 'basic_ms4_name', delKey: 'basic_ms4_del', pct: '25%', amount: '50,000 CFA', timeKey: 'basic_ms4_time' },
        ],
        total: '200,000 CFA',
        },

        medium: {
        tag: () => t('medium_tag'),
        name: () => t('medium_name'),
        subtitle: () => t('medium_detail_subtitle'),
        price: '600,000', currency: 'FCFA',
        priceNote: () => t('medium_detail_price_note'),
        color1: '#6820EC', color2: '#2563EB', icon: 'bx-diamond',
        included: [
            { key: 'medium_di1', ok: true }, { key: 'medium_di2', ok: true },
            { key: 'medium_di3', ok: true }, { key: 'medium_di4', ok: true },
            { key: 'medium_di5', ok: true }, { key: 'medium_di6', ok: true },
            { key: 'medium_di7', ok: true }, { key: 'medium_di8', ok: true },
            { key: 'medium_di9', ok: true }, { key: 'medium_di10', ok: false },
            { key: 'medium_di11', ok: false },
        ],
        workflow: [
            { labelKey: 'medium_wf1_label', descKey: 'medium_wf1_desc' },
            { labelKey: 'medium_wf2_label', descKey: 'medium_wf2_desc' },
            { labelKey: 'medium_wf3_label', descKey: 'medium_wf3_desc' },
            { labelKey: 'medium_wf4_label', descKey: 'medium_wf4_desc' },
            { labelKey: 'medium_wf5_label', descKey: 'medium_wf5_desc' },
            { labelKey: 'medium_wf6_label', descKey: 'medium_wf6_desc' },
            { labelKey: 'medium_wf7_label', descKey: 'medium_wf7_desc' },
        ],
        milestones: [
            { nameKey: 'medium_ms1_name', delKey: 'medium_ms1_del', pct: '20%', amount: '120,000 CFA', timeKey: 'medium_ms1_time' },
            { nameKey: 'medium_ms2_name', delKey: 'medium_ms2_del', pct: '15%', amount: '90,000 CFA',  timeKey: 'medium_ms2_time' },
            { nameKey: 'medium_ms3_name', delKey: 'medium_ms3_del', pct: '20%', amount: '120,000 CFA', timeKey: 'medium_ms3_time' },
            { nameKey: 'medium_ms4_name', delKey: 'medium_ms4_del', pct: '25%', amount: '150,000 CFA', timeKey: 'medium_ms4_time' },
            { nameKey: 'medium_ms5_name', delKey: 'medium_ms5_del', pct: '10%', amount: '60,000 CFA',  timeKey: 'medium_ms5_time' },
            { nameKey: 'medium_ms6_name', delKey: 'medium_ms6_del', pct: '10%', amount: '60,000 CFA',  timeKey: 'medium_ms6_time' },
        ],
        total: '600,000 CFA',
        },

        pro: {
        tag: () => t('pro_tag'),
        name: () => t('pro_name'),
        subtitle: () => t('pro_detail_subtitle'),
        price: '1,400,000', currency: 'FCFA',
        priceNote: () => t('pro_detail_price_note'),
        color1: '#1a0a3d', color2: '#6820EC', icon: 'bx-crown',
        included: [
            { key: 'pro_di1', ok: true }, { key: 'pro_di2', ok: true },
            { key: 'pro_di3', ok: true }, { key: 'pro_di4', ok: true },
            { key: 'pro_di5', ok: true }, { key: 'pro_di6', ok: true },
            { key: 'pro_di7', ok: true }, { key: 'pro_di8', ok: true },
            { key: 'pro_di9', ok: true }, { key: 'pro_di10', ok: true },
            { key: 'pro_di11', ok: true },
        ],
        workflow: [
            { labelKey: 'pro_wf1_label', descKey: 'pro_wf1_desc' },
            { labelKey: 'pro_wf2_label', descKey: 'pro_wf2_desc' },
            { labelKey: 'pro_wf3_label', descKey: 'pro_wf3_desc' },
            { labelKey: 'pro_wf4_label', descKey: 'pro_wf4_desc' },
            { labelKey: 'pro_wf5_label', descKey: 'pro_wf5_desc' },
            { labelKey: 'pro_wf6_label', descKey: 'pro_wf6_desc' },
            { labelKey: 'pro_wf7_label', descKey: 'pro_wf7_desc' },
            { labelKey: 'pro_wf8_label', descKey: 'pro_wf8_desc' },
        ],
        milestones: [
            { nameKey: 'pro_ms1_name', delKey: 'pro_ms1_del', pct: '20%', amount: '280,000 CFA', timeKey: 'pro_ms1_time' },
            { nameKey: 'pro_ms2_name', delKey: 'pro_ms2_del', pct: '15%', amount: '210,000 CFA', timeKey: 'pro_ms2_time' },
            { nameKey: 'pro_ms3_name', delKey: 'pro_ms3_del', pct: '15%', amount: '210,000 CFA', timeKey: 'pro_ms3_time' },
            { nameKey: 'pro_ms4_name', delKey: 'pro_ms4_del', pct: '20%', amount: '280,000 CFA', timeKey: 'pro_ms4_time' },
            { nameKey: 'pro_ms5_name', delKey: 'pro_ms5_del', pct: '15%', amount: '210,000 CFA', timeKey: 'pro_ms5_time' },
            { nameKey: 'pro_ms6_name', delKey: 'pro_ms6_del', pct: '10%', amount: '140,000 CFA', timeKey: 'pro_ms6_time' },
            { nameKey: 'pro_ms7_name', delKey: 'pro_ms7_del', pct: '5%',  amount: '70,000 CFA',  timeKey: 'pro_ms7_time' },
        ],
        total: '1,400,000 CFA',
        },
    };

    function getPlanFromURL() {
        const params = new URLSearchParams(window.location.search);
        return params.get('plan') || 'basic';
    }

    function renderPlan(planKey) {
        const plan = PLANS[planKey];
        if (!plan) {
        document.getElementById('planPage').innerHTML = '<p>Plan not found. <a href="index.html#plans">Go back</a></p>';
        return;
        }

        const name     = plan.name();
        const tag      = plan.tag();
        const subtitle = plan.subtitle();
        const priceNote = plan.priceNote();
        document.title = `${name} — Amm Sa Appli`;

        const workflowHTML = plan.workflow.map((s, i) => `
        <div class="workflow-step">
            <div class="step-dot">${i + 1}</div>
            <div class="step-body">
            <h4>${t(s.labelKey)}</h4>
            <p>${t(s.descKey)}</p>
            </div>
        </div>
        `).join('');

        const milestonesHTML = plan.milestones.map(m => `
        <tr>
            <td><strong>${t(m.nameKey)}</strong></td>
            <td>${t(m.delKey)}</td>
            <td><span class="pct-badge">${m.pct}</span></td>
            <td class="amount-cell">${m.amount}</td>
            <td class="time-cell">${t(m.timeKey)}</td>
        </tr>
        `).join('');

        const includedHTML = plan.included.map(f => `
        <li class="${f.ok ? '' : 'muted'}">
            <i class='bx ${f.ok ? 'bx-check-circle' : 'bx-x-circle'}'></i>
            ${t(f.key)}
        </li>
        `).join('');

        document.getElementById('planPage').innerHTML = `
        <a href="index.html#plans" class="back-btn">
            <i class='bx bx-arrow-back'></i> ${t('plan_back')}
        </a>

        <div class="plan-hero" style="background: linear-gradient(135deg, ${plan.color1} 0%, ${plan.color2} 100%);">
            <div class="plan-hero-tag"><i class='bx ${plan.icon}'></i> &nbsp;${tag}</div>
            <h1>${name}</h1>
            <p>${subtitle}</p>
            <div class="plan-hero-price">
            <span class="amt">${plan.price}</span>
            <span class="cur">${plan.currency}</span>
            <span class="sub">${priceNote}</span>
            </div>
        </div>

        <div class="section-card">
            <h2><i class='bx bx-list-check'></i> ${t('plan_whats_included')}</h2>
            <ul class="features-list">${includedHTML}</ul>
        </div>

        <div class="section-card">
            <h2><i class='bx bx-git-branch'></i> ${t('plan_workflow_title')}</h2>
            <div class="workflow-steps">${workflowHTML}</div>
        </div>

        <div class="section-card">
            <h2><i class='bx bx-credit-card'></i> ${t('plan_payment_title')}</h2>
            <div style="overflow-x:auto;">
            <table class="milestone-table">
                <thead>
                <tr>
                    <th>${t('plan_th_milestone')}</th>
                    <th>${t('plan_th_deliverable')}</th>
                    <th>%</th>
                    <th>${t('plan_th_amount')}</th>
                    <th>${t('plan_th_timeline')}</th>
                </tr>
                </thead>
                <tbody>
                ${milestonesHTML}
                <tr class="table-total">
                    <td colspan="2"><strong>${t('plan_total')}</strong></td>
                    <td><span class="pct-badge">100%</span></td>
                    <td colspan="2"><strong>${plan.total}</strong></td>
                </tr>
                </tbody>
            </table>
            </div>
        </div>

        <div class="section-card">
            <h2><i class='bx bx-info-circle'></i> ${t('plan_rules_title')}</h2>
            <ul class="rules-list">
            <li><i class='bx bx-x-circle'></i> <span>${t('plan_rule1')}</span></li>
            <li><i class='bx bx-pause-circle'></i> <span>${t('plan_rule2')}</span></li>
            <li><i class='bx bx-lock'></i> <span>${t('plan_rule3')}</span></li>
            </ul>
        </div>

        <div class="plan-cta">
            <a href="index.html#contact">
            <i class='bx bx-send'></i> ${t('plan_cta_prefix')} ${name} ${t('plan_cta_suffix')}
            </a>
        </div>
        `;
    }

    // function getPlanFromURL() {
    //     const params = new URLSearchParams(window.location.search);
    //     return params.get('plan') || 'basic';
    // }

    renderPlan(getPlanFromURL());

    // Re-render when language changes so injected content updates too
    const _origChangeLanguage = window.changeLanguage;
    window.changeLanguage = function(lang) {
        _origChangeLanguage(lang);
        renderPlan(getPlanFromURL());
    };
  </script>
</body>
</html>
